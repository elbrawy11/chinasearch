const products=raw.map(x=>({
 id:x[0],title:x[1],titleAr:x[2],platform:x[3],price:x[4],old:x[5],rating:x[6],reviews:x[7],ship:x[8],sold:x[9],img:x[10],
 discount:Math.round((1-x[4]/x[5])*100),
 url:"https://www.google.com/search?q="+encodeURIComponent(x[1]+" "+platforms[x[3]].name)
}));

for(let i=13;i<=28;i++){
 const keys=Object.keys(platforms),p=keys[i%keys.length],price=+(5+((i*7)%45)+Math.random()*3).toFixed(2),old=+(price*(1.5+Math.random())).toFixed(2);
 products.push({id:"p"+i,title:"Trending China Product "+i,titleAr:"منتج صيني رائج "+i,platform:p,price,old,rating:+(3.9+Math.random()).toFixed(1),reviews:Math.round(300+Math.random()*5000),ship:3+((i*3)%12),sold:Math.round(30+Math.random()*500),img:"https://picsum.photos/seed/chinasearch"+i+"/900/600",discount:Math.round((1-price/old)*100),url:"https://www.google.com/search?q=china+product+"+i});
}

let state={lang:localStorage.getItem("lang")||((navigator.language||"en").startsWith("ar")?"ar":"en"),sort:"score",q:"",admin:false,aff:{}};

function cfg(){return state.lang==="ar"?{symbol:"KD",rate:.31,region:"الكويت",dir:"rtl"}:{symbol:"$",rate:1,region:"United States",dir:"ltr"}}
function t(){return I18N[state.lang]||I18N.en}
function norm(v,min,max,inv){if(max===min)return 1;let n=(v-min)/(max-min);return inv?1-n:n}
function ranked(){
 const ps=products.map(p=>p.price),ss=products.map(p=>p.ship),rs=products.map(p=>p.rating),vs=products.map(p=>p.reviews);
 const mi=a=>Math.min(...a),ma=a=>Math.max(...a);
 let data=products.map(p=>({...p,score:.35*norm(p.price,mi(ps),ma(ps),true)+.25*norm(p.ship,mi(ss),ma(ss),true)+.25*norm(p.rating,mi(rs),ma(rs),false)+.15*norm(p.reviews,mi(vs),ma(vs),false)}));
 let best=data.reduce((a,b)=>a.score>b.score?a:b),cheap=data.reduce((a,b)=>a.price<b.price?a:b),fast=data.reduce((a,b)=>a.ship<b.ship?a:b);
 return data.map(p=>({...p,isBest:p.id===best.id,isCheap:p.id===cheap.id,isFast:p.id===fast.id}));
}
function price(v){let c=cfg();return state.lang==="ar"?(v*c.rate).toFixed(2)+" "+c.symbol:c.symbol+(v*c.rate).toFixed(2)}
function click(id){let p=window._products[id],pl=platforms[p.platform],aff=state.aff[p.platform]||"demo";localStorage.setItem("click_"+p.platform,(+(localStorage.getItem("click_"+p.platform)||0)+1));window.open(p.url+"&"+pl.param+"="+encodeURIComponent(aff)+"&ref=chinasearch","_blank")}
function card(p,hero=false){
 const L=t(),name=state.lang==="ar"?p.titleAr:p.title,avg=products.reduce((s,x)=>s+x.price,0)/products.length,saved=Math.max(0,Math.round((1-p.price/avg)*100));
 return `<div class="card ${p.isBest?'best':''} ${hero?'hero-product':''}">
  <div class="image"><img src="${p.img}" alt="${name}"></div>
  <div class="badges">
   ${p.isBest?`<span class="tag best">🏆 ${L.bestChoice}</span>`:""}
   ${p.isCheap?`<span class="tag cheap">💰 ${L.cheapest}</span>`:""}
   ${p.isFast?`<span class="tag fast">⚡ ${L.fastest}</span>`:""}
   <span class="tag platform" style="background:${platforms[p.platform].color}">${platforms[p.platform].name}</span>
  </div>
  <h3>${name}</h3>
  <div class="price-row"><strong>${price(p.price)}</strong><del>${price(p.old)}</del><span class="discount">-${p.discount}%</span></div>
  <div class="rating-line"><span class="stars">★★★★★</span><span>${p.rating} · ${p.reviews.toLocaleString()}</span></div>
  <div class="shipping-line"><span>🚚 ${p.ship} ${L.days}</span><span>🔥 ${p.sold} today</span></div>
  <p class="saving">${L.save} ${saved}% ${L.avg}</p>
  <p class="urgency">${L.popular} · ${L.limited}</p>
  <button class="cta" onclick="click('${p.id}')">${hero?L.claim:L.get}</button>
 </div>`;
}

function render(){
 const L=t(),C=cfg();
 document.documentElement.lang=state.lang;document.documentElement.dir=C.dir;document.body.dir=C.dir;
 let data=ranked().filter(p=>!state.q||p.title.toLowerCase().includes(state.q.toLowerCase())||p.titleAr.includes(state.q));
 if(state.sort==="price")data.sort((a,b)=>a.price-b.price); else if(state.sort==="ship")data.sort((a,b)=>a.ship-b.ship); else if(state.sort==="rating")data.sort((a,b)=>b.rating-a.rating); else if(state.sort==="pop")data.sort((a,b)=>b.reviews-a.reviews); else data.sort((a,b)=>b.score-a.score);
 window._products={};data.forEach(p=>window._products[p.id]=p);let best=data.find(p=>p.isBest)||data[0];
 document.getElementById("app").innerHTML=`
 <header class="topbar">
  <div class="container nav">
   <a class="brand" href="#"><div class="logo">CS</div><div><h1>ChinaSearch</h1><span>${L.sub}</span></div></a>
   <nav class="navlinks"><a href="#deals">${L.navDeals}</a><a href="#platforms">${L.navPlatforms}</a><a href="#why">${L.navWhy}</a><a href="#how">${L.navHow}</a><a href="#faq">${L.navFaq}</a></nav>
   <div class="nav-actions"><select class="select" onchange="state.lang=this.value;localStorage.setItem('lang',this.value);render()"><option value="ar" ${state.lang==='ar'?'selected':''}>العربية</option><option value="en" ${state.lang==='en'?'selected':''}>English</option></select><button class="ghost" onclick="state.admin=!state.admin;render()">⚙️ ${L.admin}</button><a class="primary" href="#deals">${L.start}</a></div>
  </div>
 </header>

 <section class="hero">
  <div class="container hero-inner">
   <div>
    <div class="badge-line"><span class="pill">✅ ${L.trusted}</span><span class="pill">AliExpress</span><span class="pill">Temu</span><span class="pill">SHEIN</span></div>
    <h2>${L.title}<br><span class="accent">${L.accent}</span></h2>
    <p>${L.sub}</p>
    <div class="search-panel"><span class="icon">🔍</span><input value="${state.q}" oninput="state.q=this.value;render()" placeholder="${L.search}"><button onclick="document.getElementById('deals').scrollIntoView()">${L.searchBtn}</button></div>
    <div class="stats"><div class="stat"><b>20K+</b><span>${L.products}</span></div><div class="stat"><b>5</b><span>${L.markets}</span></div><div class="stat"><b>24h</b><span>${L.updated}</span></div></div>
   </div>
   <div class="hero-card-wrap">${best?card(best,true):""}</div>
  </div>
 </section>

 <section class="admin ${state.admin?'open':''}">
  <div class="container admin-grid">
   <div class="admin-panel"><h3>${L.mode}</h3><select><option>${L.mock}</option><option>${L.live}</option></select></div>
   <div class="admin-panel"><h3>${L.aff}</h3>${Object.keys(platforms).map(k=>`<input placeholder="${platforms[k].name} ID" oninput="state.aff['${k}']=this.value">`).join("")}</div>
   <div class="admin-panel"><h3>${L.stats}</h3><p>AliExpress: ${localStorage.getItem("click_aliexpress")||0}</p><p>Temu: ${localStorage.getItem("click_temu")||0}</p><p>SHEIN: ${localStorage.getItem("click_shein")||0}</p></div>
  </div>
 </section>

 <div class="filters"><div class="container filter-row"><b>${L.sort}</b>${[["score",L.score],["price",L.cheap],["ship",L.fast],["rating",L.rating],["pop",L.pop]].map(x=>`<button class="chip ${state.sort===x[0]?'active':''}" onclick="state.sort='${x[0]}';render()">${x[1]}</button>`).join("")}</div></div>

 <main id="deals" class="container section">
  <div class="section-head"><div><h2>${L.deals}</h2><p>${L.dealsSub}</p></div><span class="pill" style="background:#fff;color:#111;border-color:#e5e7eb">${L.bestToday}: ${C.region}</span></div>
  ${data.length?`<div class="grid">${data.map(p=>card(p)).join("")}</div>`:`<div class="empty">No products found</div>`}
 </main>

 <section id="why" class="container section">
  <div class="section-head"><div><h2>${L.why}</h2><p>${L.whySub}</p></div></div>
  <div class="info-grid"><div class="info-card"><div class="big">⚖️</div><h3>${L.w1}</h3><p>${L.w1p}</p></div><div class="info-card"><div class="big">🏆</div><h3>${L.w2}</h3><p>${L.w2p}</p></div><div class="info-card"><div class="big">💰</div><h3>${L.w3}</h3><p>${L.w3p}</p></div><div class="info-card"><div class="big">📱</div><h3>${L.w4}</h3><p>${L.w4p}</p></div></div>
 </section>

 <section id="platforms" class="container section">
  <div class="section-head"><div><h2>${L.plats}</h2><p>${L.platsSub}</p></div></div>
  <div class="platforms">${Object.keys(platforms).map(k=>`<div class="platform-card"><div class="platform-dot" style="background:${platforms[k].color}">${platforms[k].name[0]}</div>${platforms[k].name}</div>`).join("")}</div>
 </section>

 <section id="how" class="container section">
  <div class="section-head"><div><h2>${L.how}</h2></div></div>
  <div class="steps"><div class="step"><div class="step-number">1</div><h3>${L.s1}</h3><p>${L.s1p}</p></div><div class="step"><div class="step-number">2</div><h3>${L.s2}</h3><p>${L.s2p}</p></div><div class="step"><div class="step-number">3</div><h3>${L.s3}</h3><p>${L.s3p}</p></div></div>
 </section>

 <section id="faq" class="container section">
  <div class="section-head"><h2>${L.faq}</h2></div>
  <div class="faq"><details><summary>${L.q1}</summary><p>${L.a1}</p></details><details><summary>${L.q2}</summary><p>${L.a2}</p></details><details><summary>${L.q3}</summary><p>${L.a3}</p></details><details><summary>${L.q4}</summary><p>${L.a4}</p></details></div>
 </section>

 <footer><div class="container footer-grid"><div><h3>ChinaSearch</h3><p>${L.footer}</p></div><div><h4>${L.navDeals}</h4><a href="#deals">Best Deals</a><a href="#why">Why Us</a></div><div><h4>${L.navPlatforms}</h4><a>AliExpress</a><a>Temu</a><a>SHEIN</a></div><div><h4>Legal</h4><a>Terms</a><a>Privacy</a><a>Contact</a></div></div></footer>
 `;
}
render();
</script>
</body>
</html>
