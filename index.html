const raw=[["p1","Smart Wireless Earbuds Pro","سماعات لاسلكية ذكية برو","aliexpress",9.99,39.99,4.8,3421,6,4500,"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"],["p2","Ultra Fast USB-C Charger 65W","شاحن USB-C سريع 65 واط","banggood",14.5,49.99,4.7,2100,4,3200,"https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=600"],["p3","Smart Watch Fitness Tracker","ساعة ذكية لتتبع اللياقة","temu",18.9,69.99,4.6,5100,8,6800,"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600"],["p4","LED Desk Lamp With Wireless Charging","مصباح مكتب LED مع شحن لاسلكي","dhgate",22.0,55.0,4.4,980,5,1200,"https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=600"],["p5","Minimal Crossbody Fashion Bag","حقيبة كروس عصرية","shein",11.25,35.0,4.5,1700,7,2400,"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"],["p6","Portable Mini Projector","بروجكتور صغير محمول","aliexpress",39.99,120.0,4.3,850,10,1600,"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600"],["p7","Car Phone Holder Magnetic","حامل هاتف مغناطيسي للسيارة","temu",4.99,19.99,4.6,2900,9,5000,"https://images.unsplash.com/photo-1517524008697-84bbe3c3fd98?w=600"],["p8","Beauty Skincare Roller Set","مجموعة رولر للعناية بالبشرة","shein",7.5,24.99,4.5,1250,6,1800,"https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=600"],["p9","Smart Home WiFi Plug","قابس منزلي ذكي واي فاي","banggood",6.8,25.0,4.7,3900,5,4400,"https://images.unsplash.com/photo-1558089687-f282ffcbc126?w=600"],["p10","Gaming Mouse RGB","ماوس ألعاب RGB","dhgate",12.0,45.0,4.4,1800,11,2900,"https://images.unsplash.com/photo-1527814050087-3793815479db?w=600"],["p11","Ultra Cheap Phone Case","جراب هاتف رخيص جدًا","aliexpress",1.99,12.0,4.1,760,12,2000,"https://images.unsplash.com/photo-1603313011101-320f26a4f6f6?w=600"],["p12","Express Delivery Cable Pack","مجموعة كابلات شحن سريع","temu",8.2,29.0,4.8,2500,2,4100,"https://images.unsplash.com/photo-1615529328331-f8917597711f?w=600"]];
const products=raw.map(x=>({id:x[0],title:x[1],titleAr:x[2],platform:x[3],price:x[4],old:x[5],rating:x[6],reviews:x[7],ship:x[8],sold:x[9],img:x[10],discount:Math.round((1-x[4]/x[5])*100),url:"https://www.google.com/search?q="+encodeURIComponent(x[1]+" "+platforms[x[3]].name)}));
for(let i=13;i<=28;i++){let keys=Object.keys(platforms),p=keys[i%keys.length],price=+(5+((i*7)%45)+Math.random()*3).toFixed(2),old=+(price*(1.5+Math.random())).toFixed(2);products.push({id:"p"+i,title:"Trending China Product "+i,titleAr:"منتج صيني رائج "+i,platform:p,price,old,rating:+(3.9+Math.random()).toFixed(1),reviews:Math.round(300+Math.random()*5000),ship:3+((i*3)%12),sold:Math.round(30+Math.random()*500),img:"https://picsum.photos/seed/china"+i+"/600/400",discount:Math.round((1-price/old)*100),url:"https://www.google.com/search?q=china+product+"+i})}
let state={lang:localStorage.getItem("lang")||((navigator.language||"en").startsWith("ar")?"ar":"en"),sort:"score",q:"",admin:false,aff:{}};
function cfg(){return state.lang==="ar"?{symbol:"KD",rate:.31,region:"الكويت",dir:"rtl"}:{symbol:"$",rate:1,region:"United States",dir:"ltr"}}function tr(){return dict[state.lang]||dict.en}function norm(v,min,max,inv){if(max===min)return 1;let n=(v-min)/(max-min);return inv?1-n:n}
function ranked(){let ps=products.map(p=>p.price),ss=products.map(p=>p.ship),rs=products.map(p=>p.rating),vs=products.map(p=>p.reviews);let mi=a=>Math.min(...a),ma=a=>Math.max(...a);let data=products.map(p=>({...p,score:.35*norm(p.price,mi(ps),ma(ps),1)+.25*norm(p.ship,mi(ss),ma(ss),1)+.25*norm(p.rating,mi(rs),ma(rs),0)+.15*norm(p.reviews,mi(vs),ma(vs),0)}));let best=data.reduce((a,b)=>a.score>b.score?a:b),cheap=data.reduce((a,b)=>a.price<b.price?a:b),fast=data.reduce((a,b)=>a.ship<b.ship?a:b);return data.map(p=>({...p,isBest:p.id===best.id,isCheap:p.id===cheap.id,isFast:p.id===fast.id}))}
function price(v){let c=cfg();return state.lang==="ar"?(v*c.rate).toFixed(2)+" "+c.symbol:c.symbol+(v*c.rate).toFixed(2)}function click(id){let p=window._products[id],pl=platforms[p.platform],aff=state.aff[p.platform]||"demo";localStorage.setItem("click_"+p.platform,(+(localStorage.getItem("click_"+p.platform)||0)+1));window.open(p.url+"&"+pl.param+"="+encodeURIComponent(aff)+"&ref=chinasearch","_blank")}
function card(p,hero){let t=tr(),name=state.lang==="ar"?p.titleAr:p.title,avg=products.reduce((s,x)=>s+x.price,0)/products.length,saved=Math.max(0,Math.round((1-p.price/avg)*100));return `<div class="card ${p.isBest?'best':''} ${hero?'hero-card':''}"><div class="img"><img src="${p.img}"></div><div class="badges">${p.isBest?`<span class="badge red">🏆 ${t.bestChoice}</span>`:""}${p.isCheap?`<span class="badge green">💰 ${t.cheapest}</span>`:""}${p.isFast?`<span class="badge yellow">⚡ ${t.fastest}</span>`:""}<span class="badge platform" style="background:${platforms[p.platform].color}">${platforms[p.platform].name}</span></div><h3>${name}</h3><div class="price"><strong>${price(p.price)}</strong><span>${price(p.old)}</span><em>-${p.discount}%</em></div><div class="meta"><span class="stars">★★★★★</span><span>${p.rating} (${p.reviews})</span></div><div class="info"><span>🚚 ${p.ship} ${t.days}</span><span>🔥 ${p.sold}</span></div><p class="saving">${t.save} ${saved}% ${t.avg}</p><p class="urgency">${t.popular} · ${t.limited}</p><button class="cta" onclick="click('${p.id}')">${hero?t.claim:t.get}</button></div>`}

render();
</script>
