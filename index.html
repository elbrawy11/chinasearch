  <style>

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px;max-width:650px}.stat{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:14px}.stat b{display:block;font-size:23px}.stat span{font-size:12px;color:#d1d5db}

    .benefits{margin-top:-25px;position:relative;z-index:5}.benefit-strip{background:white;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden}.benefit{padding:18px;display:flex;gap:12px;align-items:center;border-inline-start:1px solid var(--line)}.benefit:first-child{border:0}.benefit .bicon{width:44px;height:44px;border-radius:16px;background:#fff3e8;color:#c2410c;display:grid;place-items:center;font-size:24px}.benefit b{display:block}.benefit span{font-size:12px;color:var(--muted)}
    .section{padding:34px 0}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:18px}.section-head h2{margin:0;font-size:32px;letter-spacing:-.8px}.section-head p{margin:6px 0 0;color:var(--muted)}
    .best-deal{display:grid;grid-template-columns:.95fr 1.05fr;gap:20px;align-items:stretch;background:white;border:1px solid var(--line);border-radius:30px;padding:18px;box-shadow:var(--shadow)}.best-copy{padding:20px}.best-copy h2{font-size:34px;margin:0 0 12px}.best-copy p{color:var(--muted);line-height:1.8}.reason{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:14px}.reason b{color:#0f172a}.reason ul{margin:10px 0 0;padding-inline-start:20px;color:#475569;line-height:1.8}
    .card{background:white;color:#111827;border:1px solid rgba(229,231,235,.92);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);transition:.22s;overflow:hidden;position:relative}.card:hover{transform:translateY(-5px);box-shadow:0 22px 55px rgba(15,23,42,.16)}.card.best{border-color:rgba(255,106,0,.65);box-shadow:0 0 0 4px rgba(255,106,0,.10),0 24px 60px rgba(255,106,0,.18)}

    .filters{position:sticky;top:76px;z-index:60;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(229,231,235,.75);padding:12px 0}.filter-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.chip{border:1px solid var(--line);background:white;color:#374151;border-radius:999px;padding:10px 13px;font-weight:900;cursor:pointer}.chip.active{background:#fff3e8;color:#c2410c;border-color:#fb923c;box-shadow:0 8px 18px rgba(251,146,60,.14)}

    .best-platform-hero{

    footer{background:#071225;color:#d1d5db;padding:34px 0;margin-top:30px}.footer-grid{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:20px}footer h3,footer h4{color:white;margin-top:0}footer p,footer a{color:#9ca3af;line-height:1.9;display:block}

    .rewards-section{margin-top:-8px;position:relative;z-index:6}

 <section id="platforms" class="container section"><div class="best-platform-hero"><div class="best-platform-content"><span class="pill">🏆 ${l.bestPlatform}</span><div class="platform-title-big"><span class="icon" style="background:${platforms[bp].color}">${platforms[bp].name[0]}</span><div><b>${platforms[bp].name}</b><p>${l.bestPlatformSub}</p></div></div><div class="best-platform-actions"><a class="primary" href="#deals">${l.bestPlatformCta}</a><button class="ghost" onclick="state.admin=true;render();document.querySelector('.admin').scrollIntoView()">${l.admin}</button></div></div><div class="best-platform-score"><div class="score-box"><div class="score-row"><b>${l.dealScore}</b><b>${bpScore}/100</b></div><div class="bar"><span style="width:${bpScore}%"></span></div></div><div class="score-box"><b>${l.bestPlatformWhy}</b><div class="score-row"><span>⭐ Rating</span><span>${bpStats.avgRating.toFixed(1)}</span></div><div class="score-row"><span>🚚 Shipping</span><span>${bpStats.avgShip.toFixed(1)} ${l.days}</span></div><div class="score-row"><span>💰 ${l.commission}</span><span>${platforms[bp].commission}%</span></div></div></div></div></section>

 <section id="why" class="container section"><div class="section-head"><div><h2>${l.whyTitle}</h2><p>${l.whySub}</p></div></div><div class="info-grid"><div class="info-card"><div class="big">🛡️</div><h3>${l.w1}</h3><p>${l.w1p}</p></div><div class="info-card"><div class="big">💸</div><h3>${l.w2}</h3><p>${l.w2p}</p></div><div class="info-card"><div class="big">⚡</div><h3>${l.w3}</h3><p>${l.w3p}</p></div><div class="info-card"><div class="big">🌍</div><h3>${l.w4}</h3><p>${l.w4p}</p></div></div></section>

 <footer><div class="container footer-grid"><div><h3>ChinaSearch</h3><p>${l.footer}</p></div><div><h4>${l.deals}</h4><a href="#deals">${l.best}</a><a>${l.cheap}</a><a>${l.fast}</a></div><div><h4>${l.platforms}</h4>${Object.keys(platforms).slice(0,4).map(k=>`<a>${platforms[k].name}</a>`).join("")}</div><div><h4>${l.country}</h4><a>${c.flag} ${state.lang==='ar'?c.countryAr:c.countryEn}</a><a>${c.currency}</a><a>${c.region}</a></div></div></footer>
